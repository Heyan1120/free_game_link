<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>正在跳轉至 Steam 商店...</h2>
        <p>請稍候，即將為您開啟遊戲頁面</p>
    </div>

    <script>
    window.onload = function() {
    const gameMap = {
        "eworlds": "https://store.steampowered.com/app/2513440/eWorlds/",
        "ninehells": "https://store.steampowered.com/app/2860410/NineHells/",
        "looters": "https://store.steampowered.com/app/2485580/Looters/"
    };

    const urlParams = new URLSearchParams(window.location.search);
    const gameKey = urlParams.get('g')?.toLowerCase();
    const targetGame = gameMap[gameKey] || "https://s.shopee.tw/9Ke9GrTOWz"; 

    // --- 核心改動：改用隱形圖片 (Image) 代替 iframe ---
    // 圖片加載通常比 iframe 快，且不容易被瀏覽器攔截
    var img = new Image();
    img.src = "https://s.shopee.tw/9Ke9GrTOWz"; 

    // 只要圖片開始加載，Cookie 通常就會種下
    // 設定一個保險的延遲時間後跳轉
    setTimeout(function() {
        window.location.href = targetGame;
    }, 1500); // 這裡固定 1.5 秒，給足夠時間跑背景
};
    </script>
</body>
