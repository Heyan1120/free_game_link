<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>正在跳轉至 Steam 商店...</h2>
        <p>請稍候，即將為您開啟遊戲頁面</p>
    </div>

    <script>
    window.onload = function() {
        const gameMap = {
            "eworlds": "https://store.steampowered.com/app/2513440/eWorlds/",
            "ninehells": "https://store.steampowered.com/app/2860410/NineHells/"
        };

        const urlParams = new URLSearchParams(window.location.search);
        const gameKey = urlParams.get('g')?.toLowerCase();
        const targetGame = gameMap[gameKey] || "https://s.shopee.tw/9Ke9GrTOWz"; 

        // 1. 先啟動計時器，確保不管蝦皮多慢，最後一定會跳轉
        setTimeout(function() {
            window.location.href = targetGame;
        }, 1500); // 1.5 秒後準時跳走

        // 2. 使用非同步方式載入 iframe，不阻塞主執行緒
        setTimeout(function() {
            var frame = document.createElement('iframe');
            frame.style.display = 'none';
            frame.src = "https://s.shopee.tw/9Ke9GrTOWz"; 
            document.body.appendChild(frame);
        }, 0); 
    };
    </script>
</body>
