<script>
window.onload = function() {
    const gameMap = {
        "eworlds": "https://store.steampowered.com/app/2513440/eWorlds/",
        "ninehells": "https://store.steampowered.com/app/2860410/NineHells/"
    };

    const urlParams = new URLSearchParams(window.location.search);
    const rawKey = urlParams.get('g');
    const gameKey = rawKey ? rawKey.toLowerCase() : null;
    const targetGame = gameMap[gameKey] || "https://s.shopee.tw/9Ke9GrTOWz"; 

    // --- 核心優化：監聽 iframe 加載 ---
    var frame = document.createElement('iframe');
    frame.style.display = 'none';
    frame.src = "https://s.shopee.tw/9Ke9GrTOWz"; 
    
    // 當 iframe 載入完成（或出錯）後，才觸發跳轉計時
    frame.onload = function() {
        console.log("Cookie 植入站點載入完成");
        startJump();
    };
    
    // 防呆：萬一蝦皮掛了，3秒後還是強制跳轉
    var fallback = setTimeout(startJump, 3000);

    function startJump() {
        clearTimeout(fallback); // 清除防呆計時
        var delay = Math.floor(Math.random() * 500) + 800; // 稍微縮短延遲，提升體驗
        setTimeout(function() {
            window.location.href = targetGame;
        }, delay);
    }

    document.body.appendChild(frame);
};
};
</script>
